workflows:
  # ── iOS Build ──
  ios-release:
    name: Cereza iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      groups:
        - cereza_env
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cereza.loyalty
    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.xcarchive

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # ── Android Build ──
  android-release:
    name: Cereza Android Release
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: 18
      java: 17
      groups:
        - cereza_env
    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build Android AAB (for Play Store)
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
