<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- viewport-fit=cover ist KRITISCH für iPhone ohne Abstand unten -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#b02605" />
    <title>Cereza Loyalty</title>
    <!-- Fonts: Playfair Display (Editorial) + Plus Jakarta Sans (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed;
        inset: 0;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        background: #fef9eb;
        font-family: 'Plus Jakarta Sans','Inter',-apple-system,sans-serif;
        /* Zoom verhindern */
        touch-action: pan-x pan-y;
        -ms-touch-action: pan-x pan-y;
      }
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed;
        inset: 0;
        background: #fef9eb;
      }
      @supports (padding-bottom: env(safe-area-inset-bottom)) {
        html { height: -webkit-fill-available; }
        body { min-height: -webkit-fill-available; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
        navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
